name: Bootstrap source

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish reviewed source tree
        shell: bash
        run: |
          unzip -o browser-bootstrap-source.zip
          rm browser-bootstrap-source.zip .github/workflows/bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Release Line Last Modified 1.0.0"
          git push origin HEAD:main
