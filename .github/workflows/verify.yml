name: Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Build release archive
        run: |
          mkdir -p release
          zip -j "release/line-last-modified-$(node -p "require('./manifest.json').version").zip" manifest.json main.js styles.css
      - run: npm run verify-release
